name: Deploy Docs to GitHub Pages
on:
  push:
    branches: [main]
    paths:
      - 'memintel-site/**'
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: memintel-site/package-lock.json
      - name: Install dependencies
        run: npm install
        working-directory: memintel-site
      - name: Generate OpenAPI docs
        run: npm run gen-api-docs
        working-directory: memintel-site
      - name: Build site
        run: npm run build
        working-directory: memintel-site
      - name: List build output
        run: find . -name "build" -type d 2>/dev/null | head -20
      - name: Copy build to root
        run: cp -r memintel-site/build ./build
      - name: Debug filesystem
        run: |
          echo "=== Repo root ==="
          ls -la
          echo "=== memintel-site ==="
          ls -la memintel-site/
          echo "=== Looking for build ==="
          find . -name "build" -type d
      - name: Copy build to root
        run: cp -r memintel-site/build ./build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build
  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
